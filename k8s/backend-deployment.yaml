apiVersion: apps/v1
kind: Deployment
metadata:
  name: eva-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eva-backend
  template:
    metadata:
      labels:
        app: eva-backend
    spec:
      containers:
        - name: backend
          image: eva/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
            - name: DB_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: eva-backend
spec:
  selector:
    app: eva-backend
  ports:
    - port: 3000
      targetPort: 3000
