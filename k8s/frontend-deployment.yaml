apiVersion: apps/v1
kind: Deployment
metadata:
  name: eva-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eva-frontend
  template:
    metadata:
      labels:
        app: eva-frontend
    spec:
      containers:
        - name: frontend
          image: eva/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: eva-frontend
spec:
  selector:
    app: eva-frontend
  ports:
    - port: 80
      targetPort: 80
